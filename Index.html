<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RSP Play | เป่ายิ้งฉุบ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg: #F2F2F7; /* สีพื้นหลังสไตล์ iOS */
            --card: #FFFFFF; 
            --text: #1C1C1E; 
            --subtext: #8E8E93; 
            --primary: #007AFF;
            --border: #E5E5EA;
        }
        body { font-family: 'Prompt', sans-serif; background-color: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; padding-bottom: 90px; }
        
        .card-ui { background-color: var(--card); border-radius: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.03); border: 1px solid var(--border); }
        .input-ui { background-color: var(--bg); border: 1px solid var(--border); border-radius: 16px; color: var(--text); padding: 16px; width: 100%; transition: all 0.2s; }
        .input-ui:focus { border-color: var(--primary); outline: none; background-color: #fff; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .btn-ui { background-color: var(--text); color: white; border-radius: 20px; font-weight: 600; padding: 16px; width: 100%; transition: 0.2s; cursor: pointer; border: none; }
        .btn-ui:active { transform: scale(0.97); opacity: 0.9; }
        .btn-primary { background-color: var(--primary); color: white; }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-btn { color: var(--subtext); transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33.33%; padding: 10px 0; border-radius: 20px;}
        .nav-btn.active { color: var(--primary); }
        .nav-btn.active i { color: var(--primary); transform: scale(1.1); }
        
        .game-btn { background-color: var(--card); border: 1px solid var(--border); border-radius: 28px; aspect-ratio: 1; font-size: 3rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: 0.1s; cursor: pointer;}
        .game-btn:active { background-color: var(--bg); transform: scale(0.92); }

        .sub-menu { color: var(--subtext); padding-bottom: 8px; border-bottom: 2px solid transparent; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .sub-menu.active { color: var(--text); border-bottom-color: var(--text); }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

    <div id="loader" class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-10 h-10 border-4 border-gray-100 border-t-blue-500 rounded-full animate-spin mb-4"></div>
        <div class="text-sm text-gray-400 font-medium tracking-wide">กำลังเตรียมระบบ...</div>
    </div>

    <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-6 bg-white">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-5xl font-bold mb-2 text-black">RSP<span class="text-blue-500">.</span></h1>
            <p class="text-gray-500 text-sm mb-10">ลงชื่อเข้าใช้เพื่อเล่นเกม</p>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="อีเมล" class="input-ui text-center">
                <input type="password" id="pass" placeholder="รหัสผ่าน" class="input-ui text-center">
                <button onclick="handleAuth('login')" class="btn-ui shadow-lg">เข้าสู่ระบบ</button>
                <div class="pt-4">
                    <button onclick="handleAuth('reg')" class="text-gray-500 text-sm hover:text-black">ยังไม่มีบัญชี? <span class="font-bold underline">สมัครสมาชิก</span></button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden max-w-md mx-auto pt-6 px-4">
        
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-[11px] text-gray-500 font-bold tracking-wider uppercase">ยอดเงินคงเหลือ</p>
                <h2 class="text-3xl font-bold text-black mt-1">฿ <span id="u-bal">0.00</span></h2>
            </div>
            <div onclick="switchTab('profile')" class="w-12 h-12 bg-white rounded-full flex items-center justify-center border border-gray-200 shadow-sm cursor-pointer active:scale-95 transition">
                <i class="fas fa-user text-gray-700 text-lg"></i>
            </div>
        </div>

        <div id="tab-home" class="tab-content active">
            <div class="card-ui p-6 text-center mb-6">
                <p class="text-gray-500 text-sm font-medium mb-4">จำนวนเงินเดิมพัน</p>
                <div class="flex items-center justify-center mb-8 border-b border-gray-100 pb-4">
                    <span class="text-2xl text-gray-400 mr-2 font-medium">฿</span>
                    <input type="number" id="bet" value="20" class="bg-transparent text-center text-5xl font-bold text-black outline-none w-32 p-0 focus:ring-0">
                </div>
                
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="play('rock')" class="game-btn">✊</button>
                    <button onclick="play('paper')" class="game-btn">🖐</button>
                    <button onclick="play('scissors')" class="game-btn">✌️</button>
                </div>
                <p class="text-[11px] text-gray-400 mt-6">เลือกเป่ายิ้งฉุบเพื่อออกผล • ขั้นต่ำ 10 บาท</p>
            </div>
        </div>

        <div id="tab-wallet" class="tab-content">
            <div class="flex justify-around mb-6 px-4">
                <div onclick="switchWallet('deposit')" id="menu-deposit" class="sub-menu active w-1/2 text-center">ฝากเงิน</div>
                <div onclick="switchWallet('withdraw')" id="menu-withdraw" class="sub-menu w-1/2 text-center">ถอนเงิน</div>
            </div>

            <div id="sec-deposit" class="card-ui p-8 text-center">
                <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-wallet text-2xl text-blue-500"></i>
                </div>
                <h3 class="text-lg font-bold mb-2 text-black">เติมเครดิต</h3>
                <p class="text-gray-500 text-sm mb-6 leading-relaxed">ติดต่อแอดมินเพื่อขอรับเลขบัญชีสำหรับโอนเงิน หรือส่งสลิปเพื่อปรับยอด</p>
                <button onclick="contactAdmin()" class="btn-ui btn-primary flex justify-center items-center gap-2 shadow-md shadow-blue-500/20">
                    <i class="fab fa-facebook-messenger"></i> ทักแชทแอดมิน
                </button>
            </div>

            <div id="sec-withdraw" class="hidden">
                <div class="card-ui p-6 space-y-4">
                    <select id="w-bank" class="input-ui bg-white">
                        <option value="">-- เลือกธนาคาร --</option>
                        <option value="กสิกรไทย">กสิกรไทย</option>
                        <option value="ไทยพาณิชย์">ไทยพาณิชย์</option>
                        <option value="กรุงเทพ">กรุงเทพ</option>
                        <option value="กรุงไทย">กรุงไทย</option>
                        <option value="พร้อมเพย์">พร้อมเพย์</option>
                        <option value="ทรูมันนี่">TrueMoney</option>
                    </select>
                    <input type="text" id="w-name" placeholder="ชื่อบัญชี" class="input-ui bg-white">
                    <input type="tel" id="w-acc" placeholder="เลขบัญชี / เบอร์" class="input-ui bg-white">
                    <input type="number" id="w-amt" placeholder="จำนวนเงินถอน (ขั้นต่ำ 100)" class="input-ui bg-white font-bold text-lg text-blue-600">
                    <button onclick="handleWithdraw()" class="btn-ui mt-2">ยืนยันการถอนเงิน</button>
                </div>
            </div>
        </div>

        <div id="tab-profile" class="tab-content">
            <div class="card-ui p-5 mb-6 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center text-xl text-gray-500">
                        <i class="fas fa-user-astronaut"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">ชื่อของคุณ</p>
                        <h3 id="p-name" class="text-lg font-bold text-black w-32 truncate">Loading</h3>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="editProfile()" class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-600 border border-gray-200 active:bg-gray-200 transition"><i class="fas fa-pen text-xs"></i></button>
                    <button onclick="auth.signOut()" class="w-10 h-10 bg-red-50 rounded-full flex items-center justify-center text-red-500 border border-red-100 active:bg-red-100 transition"><i class="fas fa-sign-out-alt text-xs"></i></button>
                </div>
            </div>

            <div class="flex justify-around mb-4 px-4">
                <div onclick="switchHist('game')" id="menu-h-game" class="sub-menu active w-1/2 text-center text-sm">ประวัติเล่นเกม</div>
                <div onclick="switchHist('trans')" id="menu-h-trans" class="sub-menu w-1/2 text-center text-sm">ประวัติฝากถอน</div>
            </div>

            <div id="hist-game-sec">
                <div class="flex justify-end mb-2 px-2">
                    <button onclick="loadGameHistory()" class="text-xs font-semibold text-blue-500 bg-blue-50 px-3 py-1.5 rounded-full active:bg-blue-100"><i class="fas fa-sync-alt mr-1"></i> รีเฟรชข้อมูล</button>
                </div>
                <div id="list-games" class="space-y-2 pb-6"></div>
            </div>

            <div id="hist-trans-sec" class="hidden">
                <div class="flex justify-end mb-2 px-2">
                    <button onclick="loadTransHistory()" class="text-xs font-semibold text-blue-500 bg-blue-50 px-3 py-1.5 rounded-full active:bg-blue-100"><i class="fas fa-sync-alt mr-1"></i> รีเฟรชข้อมูล</button>
                </div>
                <div id="list-trans" class="space-y-2 pb-6"></div>
            </div>
        </div>

    </div>

    <nav id="nav-bar" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-white/90 backdrop-blur-lg border border-gray-200 rounded-3xl flex items-center justify-between p-1.5 shadow-[0_8px_30px_rgba(0,0,0,0.06)] z-50">
        <button onclick="switchTab('home')" class="nav-btn active" id="btn-home">
            <i class="fas fa-gamepad text-xl mb-1"></i>
            <span class="text-[10px] font-medium">หน้าหลัก</span>
        </button>
        <button onclick="switchTab('wallet')" class="nav-btn" id="btn-wallet">
            <i class="fas fa-wallet text-xl mb-1"></i>
            <span class="text-[10px] font-medium">กระเป๋าเงิน</span>
        </button>
        <button onclick="switchTab('profile')" class="nav-btn" id="btn-profile">
            <i class="fas fa-list-ul text-xl mb-1"></i>
            <span class="text-[10px] font-medium">ประวัติ</span>
        </button>
    </nav>

    <script>
        // 1. ตั้งค่า Firebase
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = { balance: 0, winRate: 35, name: 'User' };

        // แจ้งเตือนสวยๆ โทนสว่าง
        const Toast = Swal.mixin({
            toast: true, position: 'top', showConfirmButton: false, timer: 2000,
            background: '#ffffff', color: '#1C1C1E', customClass: { popup: 'rounded-2xl shadow-lg border border-gray-100' }
        });

        function playSfx() {
            const s = document.getElementById('snd-click');
            if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
        }

        // ==========================================
        // 🔥 ระบบแก้หน้าโหลดค้าง (Failsafe)
        // ==========================================
        function hideLoader() {
            const l = document.getElementById('loader');
            if (l && l.style.display !== 'none') {
                l.style.opacity = '0';
                setTimeout(() => l.style.display = 'none', 300);
            }
        }
        // บังคับปิด Loader ภายใน 1.5 วินาที ไม่ว่าระบบจะพร้อมหรือไม่
        setTimeout(hideLoader, 1500);

        // 2. Auth State (ถ้าเข้าสู่ระบบแล้ว ให้โชว์หน้าเว็บเลย ไม่ต้องรอโหลด DB เสร็จ)
        auth.onAuthStateChanged(user => {
            hideLoader(); // ปิด Loader ทันทีที่เช็ค Auth เสร็จ
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
                
                // ดึงข้อมูล Realtime
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        userData = doc.data();
                        document.getElementById('p-name').innerText = userData.name || 'ไม่มีชื่อ';
                        document.getElementById('u-bal').innerText = (userData.balance || 0).toLocaleString('en-US', {minimumFractionDigits: 2});
                    }
                }, err => { console.error("DB Error:", err); });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('nav-bar').classList.add('hidden');
            }
        });

        // 3. ระบบเล่นเกม
        async function play(choice) {
            playSfx();
            const bet = Number(document.getElementById('bet').value);
            if (bet < 10) return Toast.fire({ icon: 'warning', title: 'เดิมพันขั้นต่ำ 10 บาท' });
            if (bet > userData.balance) return Toast.fire({ icon: 'error', title: 'ยอดเงินไม่เพียงพอ' });

            Swal.fire({
                html: '<div class="text-6xl animate-bounce my-4">✊</div><p class="text-gray-500 text-sm font-medium">กำลังเป่ายิ้งฉุบ...</p>',
                showConfirmButton: false, background: '#fff', timer: 1000, customClass: { popup: 'rounded-3xl' }
            });

            setTimeout(async () => {
                const win = (Math.random() * 100) < (userData.winRate || 35);
                const bot = win ? {rock:'scissors', paper:'rock', scissors:'paper'}[choice] : {rock:'paper', paper:'scissors', scissors:'rock'}[choice];
                const diff = win ? bet : -bet;

                try {
                    await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(diff) });
                    await db.collection('plays').add({
                        uid: auth.currentUser.uid, userChoice: choice, botChoice: bot,
                        bet: bet, result: win ? 'win' : 'lose',
                        localTime: Date.now(), dateStr: new Date().toLocaleString('th-TH')
                    });
                } catch(e) { console.error(e); }

                Swal.fire({
                    html: `
                        <div class="text-sm font-medium text-gray-500 mb-4">${win ? 'คุณชนะ! 🎉' : 'คุณแพ้ 😢'}</div>
                        <div class="flex justify-center items-center gap-6 text-5xl mb-6 bg-gray-50 p-4 rounded-2xl">
                            <span>${{rock:'✊',paper:'🖐',scissors:'✌️'}[choice]}</span>
                            <span class="text-sm font-bold text-gray-400">VS</span>
                            <span>${{rock:'✊',paper:'🖐',scissors:'✌️'}[bot]}</span>
                        </div>
                        <h2 class="text-4xl font-black ${win ? 'text-blue-500' : 'text-red-500'}">${win ? '+' : '-'}${Math.abs(diff)} ฿</h2>
                    `,
                    background: '#fff', color: '#000', confirmButtonText: 'เล่นต่อ',
                    customClass: { popup: 'rounded-3xl shadow-xl border border-gray-100', confirmButton: 'btn-ui mt-4' }
                });
            }, 1000);
        }

        // 4. แก้ไขชื่อ
        async function editProfile() {
            playSfx();
            const { value: newName } = await Swal.fire({
                title: 'ตั้งชื่อใหม่', input: 'text', inputValue: userData.name,
                showCancelButton: true, background: '#fff',
                customClass: { popup: 'rounded-3xl', input: 'input-ui mt-4', confirmButton: 'btn-ui bg-blue-500 mt-4', cancelButton: 'btn-ui bg-gray-200 text-black mt-2' }
            });
            if (newName && newName.trim() !== '') {
                await db.collection('users').doc(auth.currentUser.uid).update({ name: newName.trim() });
                Toast.fire({ icon: 'success', title: 'เปลี่ยนชื่อเรียบร้อย' });
            }
        }

        // 5. ระบบถอนเงิน
        async function handleWithdraw() {
            playSfx();
            const bank = document.getElementById('w-bank').value, acc = document.getElementById('w-acc').value, 
                  name = document.getElementById('w-name').value, amt = Number(document.getElementById('w-amt').value);

            if (!bank || !acc || !name || amt < 100) return Toast.fire({ icon: 'warning', title: 'กรอกให้ครบ และถอนขั้นต่ำ 100' });
            if (amt > userData.balance) return Toast.fire({ icon: 'error', title: 'ยอดเงินของคุณไม่พอ' });

            try {
                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
                await db.collection('transactions').add({
                    uid: auth.currentUser.uid, name: userData.name, amount: amt, 
                    details: `${bank} | ${acc} (${name})`, status: 'pending', type: 'withdraw',
                    localTime: Date.now(), dateStr: new Date().toLocaleString('th-TH')
                });
                
                Swal.fire({ title: 'ส่งคำขอสำเร็จ', text: 'ระบบกำลังดำเนินการ', icon: 'success', customClass: { popup: 'rounded-3xl', confirmButton: 'btn-ui' } });
                document.getElementById('w-amt').value = '';
                loadTransHistory();
            } catch (e) { Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด' }); }
        }

        // 6. ดึงข้อมูลประวัติ (No Index)
        async function loadGameHistory() {
            playSfx();
            const list = document.getElementById('list-games');
            list.innerHTML = '<p class="text-center text-gray-400 text-sm py-4">กำลังโหลดข้อมูล...</p>';
            try {
                const snap = await db.collection('plays').where('uid', '==', auth.currentUser.uid).get();
                let rec = []; snap.forEach(d => rec.push(d.data()));
                rec.sort((a,b) => b.localTime - a.localTime);

                let html = '';
                rec.slice(0, 15).forEach(d => {
                    html += `
                        <div class="card-ui p-3 flex justify-between items-center bg-white border border-gray-100">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-xl">${{rock:'✊',paper:'🖐',scissors:'✌️'}[d.userChoice]}</div>
                                <div>
                                    <p class="font-bold text-sm text-black">${d.result === 'win' ? 'ชนะเดิมพัน' : 'แพ้เดิมพัน'}</p>
                                    <p class="text-[10px] text-gray-400">${d.dateStr}</p>
                                </div>
                            </div>
                            <div class="font-black text-lg ${d.result === 'win' ? 'text-blue-500' : 'text-red-500'}">${d.result === 'win' ? '+' : '-'}${d.bet}</div>
                        </div>`;
                });
                list.innerHTML = html || '<p class="text-center text-gray-400 text-sm py-4">ยังไม่มีประวัติการเล่น</p>';
            } catch (e) { list.innerHTML = '<p class="text-center text-red-400 text-sm py-4">โหลดข้อมูลล้มเหลว</p>'; }
        }

        async function loadTransHistory() {
            playSfx();
            const list = document.getElementById('list-trans');
            list.innerHTML = '<p class="text-center text-gray-400 text-sm py-4">กำลังโหลดข้อมูล...</p>';
            try {
                const snap = await db.collection('transactions').where('uid', '==', auth.currentUser.uid).get();
                let rec = []; snap.forEach(d => rec.push(d.data()));
                rec.sort((a,b) => b.localTime - a.localTime);

                let html = '';
                rec.slice(0, 15).forEach(d => {
                    const isDep = d.type === 'deposit';
                    const stColor = d.status === 'pending' ? 'text-blue-500 bg-blue-50' : (d.status === 'approved' ? 'text-green-600 bg-green-50' : 'text-red-500 bg-red-50');
                    html += `
                        <div class="card-ui p-3 flex justify-between items-center bg-white border border-gray-100">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-sm">${isDep ? '<i class="fas fa-arrow-down text-green-500"></i>' : '<i class="fas fa-arrow-up text-red-500"></i>'}</div>
                                <div>
                                    <p class="font-bold text-sm text-black">${isDep ? 'เติมเครดิต' : 'ถอนเงิน'}</p>
                                    <p class="text-[10px] text-gray-400">${d.dateStr}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-black">฿${d.amount}</p>
                                <p class="text-[9px] font-bold uppercase px-2 py-0.5 rounded ${stColor} mt-1 inline-block">${d.status}</p>
                            </div>
                        </div>`;
                });
                list.innerHTML = html || '<p class="text-center text-gray-400 text-sm py-4">ยังไม่มีประวัติฝากถอน</p>';
            } catch (e) { list.innerHTML = '<p class="text-center text-red-400 text-sm py-4">โหลดข้อมูลล้มเหลว</p>'; }
        }

        async function contactAdmin() {
            playSfx();
            try {
                const doc = await db.collection('settings').doc('contact').get();
                if (doc.exists && doc.data().facebookUrl) window.open(doc.data().facebookUrl, '_blank');
                else Toast.fire({ icon: 'info', title: 'ยังไม่มีข้อมูลติดต่อแอดมิน' });
            } catch (e) { Toast.fire({ icon: 'error', title: 'การเชื่อมต่อขัดข้อง' }); }
        }

        // --- UI & Auth Handlers ---
        function switchTab(t) {
            playSfx();
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            if(t === 'profile') { loadGameHistory(); loadTransHistory(); }
        }

        function switchWallet(m) {
            playSfx();
            document.querySelectorAll('.sub-menu').forEach(c => c.classList.remove('active'));
            document.getElementById('sec-deposit').classList.add('hidden');
            document.getElementById('sec-withdraw').classList.add('hidden');
            document.getElementById('menu-'+m).classList.add('active');
            document.getElementById('sec-'+m).classList.remove('hidden');
        }

        function switchHist(m) {
            playSfx();
            document.getElementById('menu-h-game').classList.remove('active');
            document.getElementById('menu-h-trans').classList.remove('active');
            document.getElementById('hist-game-sec').classList.add('hidden');
            document.getElementById('hist-trans-sec').classList.add('hidden');
            document.getElementById('menu-h-'+m).classList.add('active');
            document.getElementById('hist-'+m+'-sec').classList.remove('hidden');
        }

        async function handleAuth(mode) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return Toast.fire({ icon: 'warning', title: 'กรุณากรอกข้อมูลให้ครบ' });
            Swal.fire({ title: 'กำลังโหลด...', showConfirmButton: false, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                if (mode === 'login') await auth.signInWithEmailAndPassword(e, p);
                else {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(res.user.uid).set({ name: e.split('@')[0], balance: 0, winRate: 35, role: 'user' });
                }
                Swal.close();
            } catch (err) { Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'อีเมลหรือรหัสผ่านไม่ถูกต้อง', customClass: { popup: 'rounded-3xl', confirmButton: 'btn-ui' }}); }
        }
    </script>
</body>
