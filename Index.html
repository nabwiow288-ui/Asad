<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RSP | Arcade</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .card-dark { background: #1e293b; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .tab-page { display: none; }
        .tab-page.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        /* สไตล์ปุ่มแบบกดแล้วยุบ */
        .btn-gold { background: linear-gradient(to right, #f59e0b, #d97706); color: #0f172a; transition: all 0.1s; }
        .btn-gold:active { transform: scale(0.95); background: #d97706; }
        .btn-choice { background: #334155; border: 2px solid #475569; transition: all 0.2s; }
        .btn-choice:active { border-color: #f59e0b; background: #1e293b; transform: scale(0.9); }
    </style>
</head>
<body class="pb-20">

    <div id="loader" class="fixed inset-0 bg-[#0f172a] z-[9999] flex flex-col items-center justify-center transition-opacity duration-300">
        <i class="fas fa-gamepad text-6xl text-amber-500 mb-4 animate-bounce"></i>
        <h1 class="text-3xl font-black tracking-wider text-white">RSP<span class="text-amber-500">.</span></h1>
    </div>

    <div id="auth-screen" class="hidden min-h-screen flex flex-col justify-center p-6">
        <div class="card-dark w-full max-w-md mx-auto p-8 text-center">
            <h2 class="text-4xl font-black text-white mb-2">RSP<span class="text-amber-500">.</span></h2>
            <p class="text-slate-400 text-sm mb-8">เข้าสู่ระบบเพื่อเริ่มเล่นเกม</p>
            
            <div id="login-form">
                <input type="email" id="log-email" placeholder="อีเมลของคุณ" class="w-full p-4 mb-4 bg-[#0f172a] border border-slate-700 rounded-xl text-white outline-none focus:border-amber-500">
                <input type="password" id="log-pw" placeholder="รหัสผ่าน" class="w-full p-4 mb-6 bg-[#0f172a] border border-slate-700 rounded-xl text-white outline-none focus:border-amber-500">
                <button onclick="login()" class="w-full btn-gold font-bold py-4 rounded-xl mb-4 text-lg">เข้าสู่ระบบ</button>
                <p class="text-slate-400">ยังไม่มีบัญชี? <button onclick="toggleAuth()" class="text-amber-500 font-bold hover:underline">สมัครสมาชิก</button></p>
            </div>

            <div id="reg-form" class="hidden">
                <input type="text" id="reg-name" placeholder="ชื่อเล่น" class="w-full p-4 mb-4 bg-[#0f172a] border border-slate-700 rounded-xl text-white outline-none focus:border-amber-500">
                <input type="email" id="reg-email" placeholder="อีเมล" class="w-full p-4 mb-4 bg-[#0f172a] border border-slate-700 rounded-xl text-white outline-none focus:border-amber-500">
                <input type="password" id="reg-pw" placeholder="รหัสผ่าน (6 ตัวขึ้นไป)" class="w-full p-4 mb-6 bg-[#0f172a] border border-slate-700 rounded-xl text-white outline-none focus:border-amber-500">
                <button onclick="register()" class="w-full bg-slate-700 text-white font-bold py-4 rounded-xl mb-4 hover:bg-slate-600">ยืนยันการสมัคร</button>
                <p class="text-slate-400">มีบัญชีแล้ว? <button onclick="toggleAuth()" class="text-amber-500 font-bold hover:underline">กลับไปล็อกอิน</button></p>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden max-w-md mx-auto p-4 pt-6">
        
        <div class="card-dark p-5 mb-6 flex justify-between items-center border-l-4 border-l-amber-500">
            <div>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest">Player</p>
                <h3 id="disp-name" class="font-bold text-lg text-white">Loading...</h3>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 uppercase tracking-widest">Balance</p>
                <h2 class="text-2xl font-black text-amber-500">฿ <span id="disp-bal">0.00</span></h2>
            </div>
        </div>

        <div id="tab-home" class="tab-page active">
            <h3 class="font-bold text-slate-300 mb-4 px-1"><i class="fas fa-fire text-amber-500 mr-2"></i>เลือกเกม</h3>
            <div onclick="switchTab('rps')" class="card-dark p-6 flex items-center justify-between cursor-pointer hover:border-amber-500 transition">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-slate-800 rounded-xl flex items-center justify-center text-4xl shadow-inner border border-slate-700">✌️</div>
                    <div>
                        <h4 class="font-bold text-xl text-white">เป่ายิ้งฉุบ</h4>
                        <p class="text-sm text-slate-400">วัดใจ 1 ต่อ 1</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-500"></i>
            </div>
        </div>

        <div id="tab-rps" class="tab-page card-dark p-6 text-center mt-2">
            <div class="flex justify-between items-center mb-8">
                <button onclick="switchTab('home')" class="w-10 h-10 bg-slate-800 rounded-full text-slate-400 hover:text-white"><i class="fas fa-arrow-left"></i></button>
                <h2 class="font-bold text-xl text-white">เป่ายิ้งฉุบ</h2>
                <div class="w-10"></div>
            </div>
            
            <div class="bg-[#0f172a] rounded-xl p-4 mb-8 border border-slate-700">
                <label class="text-xs text-slate-400 uppercase tracking-widest">เงินเดิมพัน (บาท)</label>
                <input type="number" id="bet-rps" placeholder="0" class="w-full text-center text-4xl bg-transparent font-black outline-none text-amber-500 mt-2">
            </div>

            <p class="text-slate-400 text-sm mb-4">เลือกฝั่งของคุณ</p>
            <div class="flex justify-center gap-4">
                <button onclick="playRPS('rock')" class="btn-choice w-24 h-24 text-5xl rounded-2xl shadow-lg">✊</button>
                <button onclick="playRPS('paper')" class="btn-choice w-24 h-24 text-5xl rounded-2xl shadow-lg">🖐</button>
                <button onclick="playRPS('scissors')" class="btn-choice w-24 h-24 text-5xl rounded-2xl shadow-lg">✌</button>
            </div>
        </div>

        <div id="tab-wallet" class="tab-page">
            <h3 class="font-bold text-slate-300 mb-4 px-1"><i class="fas fa-wallet text-amber-500 mr-2"></i>ระบบการเงิน</h3>
            
            <div class="card-dark p-5 mb-4 border-l-4 border-l-blue-500">
                <h4 class="font-bold text-white mb-3">ฝากเงิน</h4>
                <p class="text-sm text-slate-400 mb-4">กรุณาติดต่อแอดมินเพื่อเติมเครดิตเข้าสู่ระบบ</p>
                <button onclick="contactAdmin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-500"><i class="fab fa-line mr-2"></i>ติดต่อแอดมิน</button>
            </div>

            <div class="card-dark p-5 border-l-4 border-l-red-500">
                <h4 class="font-bold text-white mb-3">ถอนเงิน</h4>
                <input type="number" id="wd-amt" placeholder="จำนวนเงิน (ขั้นต่ำ 100)" class="w-full p-3 mb-3 bg-[#0f172a] border border-slate-700 rounded-xl text-white outline-none">
                <input type="text" id="wd-acc" placeholder="ธนาคาร และ เลขบัญชี" class="w-full p-3 mb-4 bg-[#0f172a] border border-slate-700 rounded-xl text-white outline-none">
                <button onclick="requestWithdraw()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-500">ส่งคำขอถอนเงิน</button>
            </div>
        </div>

        <div id="tab-profile" class="tab-page">
            <div class="card-dark p-6 text-center mb-4">
                <div class="w-24 h-24 bg-slate-800 text-amber-500 border-2 border-amber-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-4"><i class="fas fa-user-astronaut"></i></div>
                <h3 id="prof-name" class="font-bold text-xl text-white">Loading...</h3>
                <p id="prof-email" class="text-slate-400 text-sm mb-6">Loading...</p>
                <button onclick="logout()" class="w-full bg-[#0f172a] border border-red-500/50 text-red-400 font-bold py-3 rounded-xl hover:bg-red-500 hover:text-white transition">ออกจากระบบ</button>
            </div>
        </div>

    </div>

    <div id="bottom-nav" class="hidden fixed bottom-0 left-0 w-full bg-[#1e293b] border-t border-slate-800 flex justify-around p-2 pb-safe z-50">
        <button onclick="switchTab('home')" class="flex-1 py-2 text-slate-500 hover:text-amber-500 flex flex-col items-center transition"><i class="fas fa-home text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">หน้าแรก</span></button>
        <button onclick="switchTab('wallet')" class="flex-1 py-2 text-slate-500 hover:text-amber-500 flex flex-col items-center transition"><i class="fas fa-wallet text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">กระเป๋า</span></button>
        <button onclick="switchTab('profile')" class="flex-1 py-2 text-slate-500 hover:text-amber-500 flex flex-col items-center transition"><i class="fas fa-user text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">ฉัน</span></button>
    </div>

    <script>
        // 1. เชื่อมต่อ Firebase (ใช้โปรเจกต์เดิมของคุณ)
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let userData = null;
        let unsubscribe = null;

        // 2. ระบบกันค้าง (บังคับปิด Loader ใน 1.5 วินาที ไม่ว่า Firebase จะตอบสนองหรือไม่)
        const loader = document.getElementById('loader');
        function forceHideLoader() {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 300);
        }
        setTimeout(forceHideLoader, 1500);

        // 3. ตรวจสอบการล็อกอินแบบตรงไปตรงมา
        auth.onAuthStateChanged((user) => {
            if (user) {
                // ถ้าล็อกอินแล้ว ให้ดึงข้อมูลแค่ 1 ครั้งแบบเบาๆ
                if(unsubscribe) unsubscribe();
                unsubscribe = db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        userData = doc.data();
                        document.getElementById('disp-name').innerText = userData.name || "Player";
                        document.getElementById('prof-name').innerText = userData.name || "Player";
                        document.getElementById('prof-email').innerText = user.email;
                        document.getElementById('disp-bal').innerText = (userData.balance || 0).toLocaleString();
                    } else {
                        // สร้างข้อมูลเริ่มต้นถ้าเพิ่งสมัคร
                        db.collection('users').doc(user.uid).set({
                            name: user.displayName || "New Player", email: user.email, balance: 0, role: 'user', winRate: 35
                        });
                    }
                });

                // เปิดหน้าแอป
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.add('flex');
            } else {
                // ถ้ายังไม่ล็อกอิน
                userData = null;
                if(unsubscribe) unsubscribe();
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('bottom-nav').classList.add('hidden');
                document.getElementById('bottom-nav').classList.remove('flex');
            }
        });

        // 4. สลับหน้าจอ
        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('reg-form').classList.toggle('hidden');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-page').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        // 5. สมัคร / เข้าสู่ระบบ / ออก
        async function register() {
            const n = document.getElementById('reg-name').value.trim();
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-pw').value;
            if(!n || !e || !p) return Swal.fire({title: 'ข้อมูลไม่ครบ', icon: 'warning', background: '#1e293b', color: '#fff'});
            
            Swal.showLoading();
            try {
                const cred = await auth.createUserWithEmailAndPassword(e, p);
                await cred.user.updateProfile({ displayName: n });
                Swal.close();
            } catch(err) { Swal.fire({title: 'สมัครไม่สำเร็จ', text: err.message, icon: 'error', background: '#1e293b', color: '#fff'}); }
        }

        function login() {
            const e = document.getElementById('log-email').value.trim();
            const p = document.getElementById('log-pw').value;
            if(!e || !p) return Swal.fire({title: 'ใส่ข้อมูลให้ครบ', icon: 'warning', background: '#1e293b', color: '#fff'});
            Swal.showLoading();
            auth.signInWithEmailAndPassword(e, p).then(() => Swal.close()).catch(() => Swal.fire({title: 'รหัสผิดพลาด', icon: 'error', background: '#1e293b', color: '#fff'}));
        }

        function logout() { auth.signOut(); }

        // 6. ระบบเกมเป่ายิ้งฉุบเพียวๆ
        const rpsIcons = { rock: '✊', paper: '🖐', scissors: '✌' };
        const winLogic = { rock: 'scissors', paper: 'rock', scissors: 'paper' };
        const loseLogic = { rock: 'paper', paper: 'scissors', scissors: 'rock' };

        async function playRPS(userChoice) {
            if(!userData) return;
            const betInput = document.getElementById('bet-rps');
            const bet = Number(betInput.value);
            
            if(bet <= 0) return Swal.fire({title: 'ใส่เงินเดิมพันด้วย', icon: 'warning', background: '#1e293b', color: '#fff'});
            if(bet > userData.balance) return Swal.fire({title: 'เงินไม่พอ!', icon: 'error', background: '#1e293b', color: '#fff'});

            // สุ่มผลแพ้ชนะจาก winRate
            const winRate = userData.winRate !== undefined ? userData.winRate : 35;
            const isWin = (Math.random() * 100) <= winRate;
            const botChoice = isWin ? winLogic[userChoice] : loseLogic[userChoice];
            const change = isWin ? bet : -bet;

            Swal.showLoading();
            
            try {
                // อัปเดตเงินในฐานข้อมูล
                await db.collection('users').doc(auth.currentUser.uid).update({
                    balance: firebase.firestore.FieldValue.increment(change)
                });

                // โชว์ผลลัพธ์
                Swal.fire({
                    title: isWin ? 'WINNER!' : 'YOU LOSE!',
                    html: `
                        <div class="flex justify-center items-center gap-6 my-6">
                            <div class="text-center"><div class="text-6xl mb-2">${rpsIcons[userChoice]}</div><p class="text-slate-400 text-sm">คุณ</p></div>
                            <div class="text-2xl font-black text-amber-500">VS</div>
                            <div class="text-center"><div class="text-6xl mb-2">${rpsIcons[botChoice]}</div><p class="text-red-400 text-sm">บอท</p></div>
                        </div>
                        <h2 class="text-3xl font-black ${isWin ? 'text-green-400' : 'text-red-400'}">${isWin?'+':''}${change} ฿</h2>
                    `,
                    background: '#1e293b', color: '#fff',
                    confirmButtonColor: '#f59e0b', confirmButtonText: 'เล่นต่อ'
                });
            } catch(e) {
                Swal.fire({title: 'เกิดข้อผิดพลาด', text: 'กรุณาลองใหม่', icon: 'error', background: '#1e293b', color: '#fff'});
            }
        }

        // 7. ระบบการเงิน (ติดต่อ & ถอน)
        function contactAdmin() { Swal.fire({title: 'ติดต่อแอดมิน', text: 'LINE ID: @admin_rsp', icon: 'info', background: '#1e293b', color: '#fff'}); }

        async function requestWithdraw() {
            const amt = Number(document.getElementById('wd-amt').value);
            const acc = document.getElementById('wd-acc').value.trim();
            if(amt < 100) return Swal.fire({title: 'ถอนขั้นต่ำ 100 ฿', icon: 'warning', background: '#1e293b', color: '#fff'});
            if(!acc) return Swal.fire({title: 'ใส่เลขบัญชีด้วย', icon: 'warning', background: '#1e293b', color: '#fff'});
            if(amt > userData.balance) return Swal.fire({title: 'ยอดเงินไม่พอ', icon: 'error', background: '#1e293b', color: '#fff'});

            Swal.showLoading();
            try {
                // 1. หักเงินลูกค้าทันที
                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
                // 2. สร้างบิลถอนเงินให้แอดมินเห็น
                await db.collection('transactions').add({
                    uid: auth.currentUser.uid, name: userData.name, amount: amt, type: 'withdraw',
                    bankAcc: acc, status: 'pending', dateStr: new Date().toLocaleString('th-TH'),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                Swal.fire({title: 'สำเร็จ', text: 'ส่งคำขอถอนเงินแล้ว', icon: 'success', background: '#1e293b', color: '#fff'});
                document.getElementById('wd-amt').value = ''; document.getElementById('wd-acc').value = '';
            } catch(e) {
                Swal.fire({title: 'ผิดพลาด', text: 'ลองใหม่อีกครั้ง', icon: 'error', background: '#1e293b', color: '#fff'});
            }
        }
    </script>
</body>
</html>
