<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RSP LUXURY | ระบบผู้เล่น</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-text { background: linear-gradient(to bottom, #fde68a, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #f59e0b; transform: scale(1.1); filter: drop-shadow(0 0 8px #f59e0b); }
        input, select { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body class="pb-28">
    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="snd-win" src="https://www.myinstants.com/media/sounds/win-sound-effect-8.mp3"></audio>
    <audio id="snd-lose" src="https://www.myinstants.com/media/sounds/fail-sound-effect.mp3"></audio>

    <div id="loader" class="fixed inset-0 z-[999] bg-[#020617] flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="gold-text text-xl font-black">RSP SYSTEM</h2>
    </div>

    <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] text-center shadow-2xl">
            <h1 class="gold-text text-5xl font-black mb-10 italic">RSP<span class="text-white">.</span></h1>
            <input type="email" id="email" placeholder="อีเมล" class="w-full p-4 mb-4 rounded-2xl outline-none">
            <input type="password" id="pass" placeholder="รหัสผ่าน" class="w-full p-4 mb-6 rounded-2xl outline-none">
            <button onclick="handleAuth('login')" class="w-full bg-amber-500 text-black font-black py-4 rounded-2xl shadow-lg active:scale-95 mb-4">เข้าสู่ระบบ</button>
            <button onclick="handleAuth('reg')" class="text-slate-400 text-sm">ยังไม่มีบัญชี? <span class="text-amber-500">สมัครที่นี่</span></button>
        </div>
    </div>

    <div id="app-screen" class="hidden max-w-md mx-auto p-4 pt-10">
        <div class="glass p-6 rounded-[2.5rem] mb-6 flex justify-between items-center border-b-2 border-amber-500/50">
            <div><p class="text-[10px] text-slate-500 uppercase font-bold">Player</p><h2 id="u-name" class="text-xl font-bold">---</h2></div>
            <div class="text-right"><p class="text-[10px] text-amber-500 font-bold uppercase">เครดิตคงเหลือ</p><p class="text-3xl font-black gold-text leading-none"><span id="u-bal">0</span></p></div>
        </div>

        <div id="tab-home" class="tab-content active">
            <div class="glass p-8 rounded-[2.5rem] text-center mb-6">
                <input type="number" id="bet" value="20" class="w-full bg-transparent text-center text-5xl font-black text-white outline-none mb-10">
                <div class="grid grid-cols-3 gap-4">
                    <button onclick="play('rock')" class="glass aspect-square rounded-3xl text-4xl hover:bg-amber-500/20 active:scale-90 transition">✊</button>
                    <button onclick="play('paper')" class="glass aspect-square rounded-3xl text-4xl hover:bg-amber-500/20 active:scale-90 transition">🖐</button>
                    <button onclick="play('scissors')" class="glass aspect-square rounded-3xl text-4xl hover:bg-amber-500/20 active:scale-90 transition">✌️</button>
                </div>
            </div>
        </div>

        <div id="tab-wallet" class="tab-content">
            <div class="glass p-6 rounded-[2.5rem] mb-6">
                <h3 class="gold-text font-black mb-4">ถอนเงิน</h3>
                <div class="space-y-3">
                    <select id="w-bank" class="w-full p-4 rounded-2xl outline-none"><option value="">เลือกธนาคาร</option><option value="กสิกรไทย">กสิกรไทย</option><option value="ไทยพาณิชย์">ไทยพาณิชย์</option><option value="วอเลท">TrueMoney Wallet</option></select>
                    <input type="text" id="w-name" placeholder="ชื่อบัญชี" class="w-full p-4 rounded-2xl outline-none">
                    <input type="tel" id="w-acc" placeholder="เลขบัญชี" class="w-full p-4 rounded-2xl outline-none">
                    <input type="number" id="w-amt" placeholder="จำนวนเงิน" class="w-full p-4 rounded-2xl outline-none font-bold text-amber-500">
                    <button onclick="handleWithdraw()" class="w-full bg-red-600 font-black py-4 rounded-2xl active:scale-95">แจ้งถอนเงิน</button>
                </div>
            </div>
            <div id="hist-list" class="space-y-2 px-2"></div>
        </div>

        <div id="tab-help" class="tab-content">
            <div class="glass p-10 rounded-[2.5rem] text-center">
                <i class="fab fa-facebook-messenger text-6xl text-blue-500 mb-6"></i>
                <h2 class="text-2xl font-bold mb-2">ติดต่อฝ่ายบริการ</h2>
                <p class="text-slate-400 text-sm mb-10">สอบถาม แจ้งปัญหา หรือแจ้งฝากเงิน</p>
                <button onclick="contactAdmin()" class="w-full bg-blue-600 font-black py-4 rounded-2xl active:scale-95">ทักแชท Facebook</button>
            </div>
        </div>
    </div>

    <nav id="nav-bar" class="hidden fixed bottom-6 left-6 right-6 h-20 glass rounded-[2rem] flex items-center justify-around z-50">
        <button onclick="switchTab('home')" class="nav-btn p-4 nav-active" id="btn-home"><i class="fas fa-gamepad text-2xl"></i></button>
        <button onclick="switchTab('wallet')" class="nav-btn p-4 text-slate-500" id="btn-wallet"><i class="fas fa-wallet text-2xl"></i></button>
        <button onclick="switchTab('help')" class="nav-btn p-4 text-slate-500" id="btn-help"><i class="fas fa-comment-dots text-2xl"></i></button>
        <button onclick="auth.signOut()" class="p-4 text-red-900"><i class="fas fa-power-off text-2xl"></i></button>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    document.getElementById('u-name').innerText = userData.name;
                    document.getElementById('u-bal').innerText = userData.balance.toLocaleString();
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('nav-bar').classList.remove('hidden');
                    document.getElementById('loader').style.display = 'none';
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('nav-bar').classList.add('hidden');
                document.getElementById('loader').style.display = 'none';
            }
        });

        async function play(choice) {
            const bet = Number(document.getElementById('bet').value);
            if (bet < 10 || bet > userData.balance) return Swal.fire('เงินไม่พอหรือเดิมพันต่ำไป', '', 'error');
            
            document.getElementById('snd-click').play();
            Swal.fire({ title: 'กำลังออกผล...', html: '<div class="text-6xl animate-bounce">✊</div>', showConfirmButton: false, timer: 1000 });

            setTimeout(async () => {
                const win = (Math.random() * 100) < (userData.winRate || 35);
                const bot = win ? {rock:'scissors', paper:'rock', scissors:'paper'}[choice] : {rock:'paper', paper:'scissors', scissors:'rock'}[choice];
                const change = win ? bet : -bet;

                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(change) });
                if(win) document.getElementById('snd-win').play(); else document.getElementById('snd-lose').play();

                Swal.fire({ 
                    title: win ? 'คุณชนะ!' : 'คุณแพ้!',
                    html: `<div class="text-4xl mb-4">${{rock:'✊',paper:'🖐',scissors:'✌️'}[choice]} VS ${{rock:'✊',paper:'🖐',scissors:'✌️'}[bot]}</div><h2 class="text-3xl font-black ${win?'text-green-500':'text-red-500'}">${win?'+':''}${change}</h2>`,
                    icon: win ? 'success' : 'error'
                });
            }, 1000);
        }

        async function loadHistory() {
            const list = document.getElementById('hist-list');
            list.innerHTML = '<p class="text-center py-4 text-xs text-slate-500">กำลังโหลด...</p>';
            
            // 🔥 เคล็ดลับ No-Index: ดึงข้อมูลดิบมาเรียงเองใน JavaScript
            const snap = await db.collection('transactions').where('uid', '==', auth.currentUser.uid).get();
            let dataArr = [];
            snap.forEach(doc => dataArr.push(doc.data()));

            // เรียงจากใหม่ไปเก่า (ใช้ dateStr หรือดึง timestamp มาเปรียบเทียบ)
            dataArr.sort((a, b) => new Date(b.dateStr.split(' ')[0].split('/').reverse().join('-')) - new Date(a.dateStr.split(' ')[0].split('/').reverse().join('-')));

            let html = '';
            dataArr.slice(0, 5).forEach(d => {
                const color = d.status === 'pending' ? 'amber-500' : (d.status === 'approved' ? 'green-500' : 'red-500');
                html += `<div class="glass p-4 rounded-2xl flex justify-between border-l-4 border-${color}">
                    <div><p class="font-bold">฿${d.amount}</p><p class="text-[9px] text-slate-500">${d.dateStr}</p></div>
                    <div class="text-xs font-black uppercase text-${color}">${d.status}</div>
                </div>`;
            });
            list.innerHTML = html || '<p class="text-center py-10 text-slate-600">ไม่มีประวัติ</p>';
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('btn-'+t).classList.add('nav-active');
            if(t === 'wallet') loadHistory();
        }

        async function handleAuth(mode) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(mode === 'login') await auth.signInWithEmailAndPassword(e, p).catch(err => Swal.fire('ผิดพลาด', 'ล็อกอินไม่สำเร็จ', 'error'));
            else {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                await db.collection('users').doc(res.user.uid).set({ name: e.split('@')[0], balance: 0, winRate: 35, role: 'user' });
            }
        }

        async function contactAdmin() {
            const doc = await db.collection('settings').doc('contact').get();
            if(doc.exists) window.open(doc.data().facebookUrl, '_blank');
        }

        async function handleWithdraw() {
            const bank = document.getElementById('w-bank').value, name = document.getElementById('w-name').value, 
                  acc = document.getElementById('w-acc').value, amt = Number(document.getElementById('w-amt').value);
            if(!bank || !name || !acc || amt < 100) return Swal.fire('กรอกข้อมูลไม่ครบ', '', 'warning');
            
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('transactions').add({
                uid: auth.currentUser.uid, name: userData.name, amount: amt, 
                bankAcc: `${bank} | ${acc} (${name})`, status: 'pending', dateStr: new Date().toLocaleString('th-TH')
            });
            Swal.fire('สำเร็จ', 'ส่งคำขอถอนเงินแล้ว', 'success');
            loadHistory();
        }
    </script>
</body>
</html>
