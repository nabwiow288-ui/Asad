<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RSP Arcade | Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; touch-action: manipulation; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .anim-play { animation: bounce-slow 0.2s infinite; }
    </style>
</head>
<body class="pb-24">

    <div id="loader" class="fixed inset-0 z-[999] bg-[#0f172a] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-amber-500 animate-pulse">กำลังเชื่อมต่อเซิร์ฟเวอร์...</p>
    </div>

    <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-8 rounded-3xl text-center">
            <h1 class="text-4xl font-bold mb-8 text-amber-500">RSP<span class="text-white">.</span></h1>
            <div id="auth-box">
                <input type="email" id="email" placeholder="อีเมล" class="w-full p-4 mb-4 bg-slate-900/50 rounded-2xl border border-slate-700 outline-none focus:border-amber-500">
                <input type="password" id="pass" placeholder="รหัสผ่าน" class="w-full p-4 mb-6 bg-slate-900/50 rounded-2xl border border-slate-700 outline-none focus:border-amber-500">
                <button onclick="handleAuth('login')" class="w-full bg-amber-500 text-slate-900 font-bold py-4 rounded-2xl shadow-lg shadow-amber-500/20 mb-4">เข้าสู่ระบบ</button>
                <button onclick="handleAuth('reg')" class="text-slate-400 text-sm">ยังไม่มีบัญชี? <span class="text-amber-500">สมัครสมาชิก</span></button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden max-w-md mx-auto p-4 pt-8">
        <div class="glass p-6 rounded-[2rem] mb-6 flex justify-between items-center border-b-4 border-amber-500">
            <div>
                <p class="text-xs text-slate-400">ยินดีต้อนรับ</p>
                <h2 id="u-name" class="text-xl font-bold">...</h2>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400">เครดิตคงเหลือ</p>
                <p class="text-2xl font-black text-amber-500">฿ <span id="u-bal">0.00</span></p>
            </div>
        </div>

        <div id="tab-home" class="tab-content active">
            <div class="glass p-8 rounded-[2rem] text-center">
                <h3 class="text-lg mb-6">🎮 เป่ายิ้งฉุบวัดดวง</h3>
                <input type="number" id="bet" placeholder="เดิมพันขั้นต่ำ 10" class="w-full p-4 mb-8 bg-slate-900/50 rounded-2xl border border-slate-700 text-center text-2xl font-bold text-amber-500 outline-none">
                <div class="flex justify-between gap-2">
                    <button onclick="play('rock')" class="flex-1 aspect-square glass rounded-2xl text-4xl hover:bg-amber-500 transition">✊</button>
                    <button onclick="play('paper')" class="flex-1 aspect-square glass rounded-2xl text-4xl hover:bg-amber-500 transition">🖐</button>
                    <button onclick="play('scissors')" class="flex-1 aspect-square glass rounded-2xl text-4xl hover:bg-amber-500 transition">✌️</button>
                </div>
            </div>
        </div>

        <div id="tab-wallet" class="tab-content">
            <div class="glass p-6 rounded-[2rem] mb-6">
                <h3 class="mb-4 font-bold flex items-center"><i class="fas fa-wallet mr-2 text-amber-500"></i> ถอนเงิน</h3>
                <div class="space-y-3">
                    <select id="w-bank" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-700 outline-none">
                        <option value="">เลือกธนาคาร</option>
                        <option value="K-Bank">กสิกรไทย</option>
                        <option value="SCB">ไทยพาณิชย์</option>
                        <option value="Wallet">TrueMoney Wallet</option>
                    </select>
                    <input type="text" id="w-name" placeholder="ชื่อบัญชี" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-700 outline-none">
                    <input type="tel" id="w-acc" placeholder="เลขบัญชี / เบอร์วอเลท" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-700 outline-none">
                    <input type="number" id="w-amt" placeholder="จำนวนเงิน" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-700 outline-none font-bold text-amber-500">
                    <button onclick="withdraw()" class="w-full bg-red-500 font-bold py-4 rounded-2xl mt-2">ยืนยันการถอน</button>
                </div>
            </div>
            <div class="px-2">
                <div class="flex justify-between mb-4">
                    <h3 class="font-bold">📋 ประวัติการถอน (5 รายการล่าสุด)</h3>
                </div>
                <div id="hist-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="tab-help" class="tab-content">
            <div class="glass p-10 rounded-[2rem] text-center">
                <i class="fab fa-facebook text-6xl text-blue-500 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">ติดต่อแอดมิน</h3>
                <p class="text-slate-400 mb-8 text-sm">หากพบปัญหาการฝาก-ถอน หรือสอบถามเพิ่มเติม</p>
                <button onclick="contactAdmin()" class="w-full bg-blue-600 font-bold py-4 rounded-2xl flex items-center justify-center">
                    <i class="fab fa-facebook-messenger mr-2 text-xl"></i> ทักแชท Facebook
                </button>
            </div>
        </div>
    </div>

    <nav id="nav-bar" class="hidden fixed bottom-6 left-4 right-4 h-16 glass rounded-2xl flex items-center justify-around px-2 border border-white/10 shadow-2xl">
        <button onclick="switchTab('home')" class="nav-link text-amber-500 p-2"><i class="fas fa-gamepad text-xl"></i></button>
        <button onclick="switchTab('wallet')" class="nav-link text-slate-400 p-2"><i class="fas fa-history text-xl"></i></button>
        <button onclick="switchTab('help')" class="nav-link text-slate-400 p-2"><i class="fas fa-comment-dots text-xl"></i></button>
        <button onclick="auth.signOut()" class="text-red-400 p-2"><i class="fas fa-sign-out-alt text-xl"></i></button>
    </nav>

    <script>
        // Config & Init
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let userDoc = null;

        // 🛡️ Monitor Auth (แก้บั๊กหน้าขาว)
        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loader');
            if (user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userDoc = doc.data();
                    document.getElementById('u-name').innerText = userDoc.name;
                    document.getElementById('u-bal').innerText = userDoc.balance.toLocaleString();
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('nav-bar').classList.remove('hidden');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('nav-bar').classList.add('hidden');
                loader.style.display = 'none';
            }
        });

        // 🎮 Play Game (พร้อมอนิเมชั่น)
        async function play(choice) {
            const amt = Number(document.getElementById('bet').value);
            if (amt < 10 || amt > userDoc.balance) return Swal.fire('เงินไม่พอหรือเดิมพันต่ำไป', '', 'error');

            // Animation Popup
            Swal.fire({
                title: 'เป่ายิ้ง...',
                html: '<div class="text-6xl anim-play">✊</div>',
                showConfirmButton: false,
                background: '#1e293b', color: '#fff'
            });

            setTimeout(async () => {
                const win = (Math.random() * 100) < (userDoc.winRate || 35);
                const bot = win ? {rock:'scissors', paper:'rock', scissors:'paper'}[choice] : {rock:'paper', paper:'scissors', scissors:'rock'}[choice];
                const change = win ? amt : -amt;

                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(change) });
                
                Swal.fire({
                    title: win ? 'คุณชนะ!' : 'คุณแพ้!',
                    html: `<div class="flex justify-around text-4xl mb-4"><span>${{rock:'✊',paper:'🖐',scissors:'✌️'}[choice]}</span> <span>VS</span> <span>${{rock:'✊',paper:'🖐',scissors:'✌️'}[bot]}</span></div>`,
                    icon: win ? 'success' : 'error',
                    background: '#1e293b', color: '#fff'
                });
            }, 1200);
        }

        // 💸 Withdraw & History
        async function withdraw() {
            const b = document.getElementById('w-bank').value, n = document.getElementById('w-name').value, 
                  a = document.getElementById('w-acc').value, v = Number(document.getElementById('w-amt').value);

            if (!b || !n || !a || v < 100) return Swal.fire('กรอกข้อมูลไม่ครบ/ขั้นต่ำ 100', '', 'warning');
            if (v > userDoc.balance) return Swal.fire('ยอดเงินไม่พอ', '', 'error');

            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-v) });
            await db.collection('transactions').add({
                uid: auth.currentUser.uid, name: userDoc.name, amount: v, bankAcc: `${b} | ${a} (${n})`,
                status: 'pending', dateStr: new Date().toLocaleString('th-TH'), type: 'withdraw', timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            Swal.fire('ส่งคำขอแล้ว', 'รอแอดมินตรวจสอบ', 'success');
            loadHistory();
        }

        async function loadHistory() {
            const snap = await db.collection('transactions').where('uid', '==', auth.currentUser.uid).orderBy('timestamp', 'desc').limit(5).get();
            let html = '';
            snap.forEach(doc => {
                const d = doc.data();
                const color = d.status === 'pending' ? 'amber-500' : (d.status === 'approved' ? 'green-500' : 'red-500');
                html += `<div class="glass p-4 rounded-2xl flex justify-between border-l-4 border-${color}">
                    <div><p class="text-sm font-bold">฿${d.amount}</p><p class="text-[10px] text-slate-500">${d.dateStr}</p></div>
                    <div class="text-xs text-${color}">${d.status}</div>
                </div>`;
            });
            document.getElementById('hist-list').innerHTML = html || '<p class="text-center text-slate-500">ไม่มีรายการ</p>';
        }

        // 🔗 Facebook Contact
        async function contactAdmin() {
            const doc = await db.collection('settings').doc('contact').get();
            if (doc.exists && doc.data().facebookUrl) window.open(doc.data().facebookUrl, '_blank');
            else Swal.fire('ยังไม่ได้ตั้งค่าลิงก์', 'ติดต่อแอดมินไม่ได้', 'info');
        }

        // UI Helpers
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            if(t === 'wallet') loadHistory();
        }

        async function handleAuth(type) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try {
                if (type === 'login') await auth.signInWithEmailAndPassword(e, p);
                else {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(res.user.uid).set({ name: e.split('@')[0], balance: 0, winRate: 35, role: 'user' });
                }
            } catch (err) { Swal.fire('ผิดพลาด', err.message, 'error'); }
        }
    </script>
</body>
</html>
